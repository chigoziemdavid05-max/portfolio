<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .login-container.show {
            display: block;
        }

        .login-container h1 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #764ba2;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .admin-dashboard {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            display: none;
        }

        .admin-dashboard.show {
            display: block;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .dashboard-header h1 {
            color: #333;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .section {
            margin-bottom: 40px;
            border: 1px solid #f0f0f0;
            padding: 20px;
            border-radius: 5px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .item-list {
            margin-top: 15px;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .item button:hover {
            background: #c0392b;
        }

        .save-btn {
            padding: 12px 30px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .save-btn:hover {
            background: #229954;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .admin-dashboard {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div class="login-container" id="loginContainer">
        <h1>🔐 Admin Login</h1>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter admin password">
        </div>
        <button class="login-btn" onclick="login()">Login</button>
        <div class="error" id="errorMsg"></div>
    </div>

    <!-- Admin Dashboard -->
    <div class="admin-dashboard" id="adminDashboard">
        <div class="dashboard-header">
            <h1>🎨 Portfolio Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="success-msg" id="successMsg">✅ Changes saved successfully!</div>

        <!-- Hero Section -->
        <div class="section">
            <h2>Hero Section</h2>
            <div class="form-group">
                <label for="heroTitle">Your Name:</label>
                <input type="text" id="heroTitle" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="heroTagline">Tagline:</label>
                <input type="text" id="heroTagline" placeholder="e.g., Data Analyst | Web Developer">
            </div>
            <div class="form-group">
                <label for="heroDescription">Description:</label>
                <textarea id="heroDescription" placeholder="Your main description"></textarea>
            </div>
        </div>

        <!-- About Section -->
        <div class="section">
            <h2>About Me</h2>
            <div class="form-group">
                <label for="aboutText">About Text:</label>
                <textarea id="aboutText" placeholder="Tell us about yourself..."></textarea>
            </div>
        </div>

        <!-- Skills Section -->
        <div class="section">
            <h2>Skills</h2>
            <div id="skillsContainer"></div>
            <button class="save-btn" onclick="addSkillCategory()">+ Add Skill Category</button>
        </div>

        <!-- Projects Section -->
        <div class="section">
            <h2>Projects</h2>
            <div id="projectsContainer"></div>
            <button class="save-btn" onclick="addProject()">+ Add Project</button>
        </div>

        <!-- Contact Section -->
        <div class="section">
            <h2>Contact Information</h2>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="your.email@example.com">
            </div>
            <div class="form-group">
                <label for="github">GitHub:</label>
                <input type="text" id="github" placeholder="@yourusername">
            </div>
            <div class="form-group">
                <label for="linkedin">LinkedIn (optional):</label>
                <input type="text" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
            </div>
        </div>

        <button class="save-btn" onclick="saveChanges()" style="width: 100%; margin-top: 30px; font-size: 18px;">💾 Save All Changes</button>
    </div>

    <script src="admin.js"></script>
</body>
</html>
